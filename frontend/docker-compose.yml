services:
  web:
    image: python:3.11-slim
    container_name: django_web
    working_dir: /app
    command: sh -c "pip install django==5.2.12 && python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ../:/app
    expose:
      - "8000"
    restart: always

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - web
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ../certbot/www:/var/www/certbot
      - ../certbot/conf:/etc/letsencrypt
    restart: always

  certbot:
    image: certbot/certbot
    volumes:
      - ../certbot/www:/var/www/certbot
      - ../certbot/conf:/etc/letsencrypt