events {}

http {
    include       mime.types;
    default_type  application/octet-stream;

    upstream django_backend {
        server django_web:8000;
    }

    # Redirección de HTTP a HTTPS
    server {
        listen 80;
        server_name acr-aula.freemyip.com;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name acr-aula.freemyip.com;

        ssl_certificate /etc/letsencrypt/live/acr-aula.freemyip.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/acr-aula.freemyip.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location /static/ {
            alias /app/staticfiles/;
        }

        location / {
            proxy_pass http://django_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}